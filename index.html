<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Support HUB</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Propio -->
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-card glass-panel">
            <div class="login-header">
                <i class="fa-solid fa-server logo-icon login-logo"></i>
                <h2>Support<span>HUB</span></h2>
                <p>Acceso al Portal Support HUB</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="Introduce tu usuario" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Introduce tu contraseña" required>
                    </div>
                </div>

                <div class="form-actions login-actions">
                    <button type="submit" class="btn-primary login-btn">Iniciar Sesión</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim().toLowerCase();

            // Guardar usuario en sessionStorage para usarlo en otras páginas
            sessionStorage.setItem('sh_username', username);

            // Redirigir según el rol
            if (username === 'admin') {
                sessionStorage.setItem('sh_role', 'admin');
                window.location.href = 'admin.html';
            } else {
                sessionStorage.setItem('sh_role', 'user');
                window.location.href = 'user.html';
            }
        });
    </script>
</body>

</html>
